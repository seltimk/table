<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Assignment</title>
</head>
<body>
<style>
    *{
        margin: 0%;
        box-sizing: border-box;

    }
    .parent{
        border: 2px solid;
        width: 50%;
        height: 90px;
        margin: 5px;
        padding: 5px;
    }

   .lastchild1{
        
        border: 2px solid;
        width: 50%;
        height: 25%;
        margin: 50px;
        padding: 25px;
        justify-self: center;
    }

    .lastchild2{
        
        border: 2px solid;
        width: 70%;
        height: 400px;
        margin: 50px;
        padding: 25px;
        justify-self: center;
        
    }
    
</style>
    <table class="parent" style="justify-self: center;margin-top: 100px; padding: 50px;">
        <tr style="margin-bottom: 100%;"> 
            <td style="border: 2px solid; width: 50%; ">
                <table class="lastchild1"></table>
            </td>
            <tr>
                <td style="border: 20px dashed white;">

                </td>
            </tr>

        </tr>

         <tr>
            <td style="border: 2px solid; width: 50%; height: 500px">
                <table class="lastchild2"></table>
            </td>
        </tr>
    </table>
    
</body>
</html>
